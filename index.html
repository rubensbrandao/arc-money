<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>ARC Protocol</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>

body{
font-family: Arial;
background:#f4f6f9;
padding:40px;
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
}

input{
padding:8px;
margin:5px;
}

#status{
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<h2>ARC Protocol</h2>

<button id="connectWallet">Conectar Carteira</button>

<p id="walletAddress">Carteira não conectada</p>

<p id="signatureStatus">Assinatura pendente</p>

<hr>

<h3>Counter</h3>

<p>Número atual: <span id="number">0</span></p>

<input id="newNumber" type="number" placeholder="Novo número">

<button id="setNumberButton" disabled>Set Number</button>

<button id="incrementButton" disabled>Increment</button>

<hr>

<h3>Saldo do contrato</h3>

<p id="contractBalance">0 ETH</p>

<input id="depositAmount" placeholder="Valor ETH">

<button id="depositButton" disabled>Depositar ETH</button>

<p id="status"></p>

<script>

const CONTRACT_ADDRESS = "0x70581DF0efd24AeA5ECaea97C2f7C7935bf59549"

const ABI = [

{
"inputs": [],
"name": "number",
"outputs": [{"internalType":"uint256","name":"","type":"uint256"}],
"stateMutability":"view",
"type":"function"
},

{
"inputs":[{"internalType":"uint256","name":"newNumber","type":"uint256"}],
"name":"setNumber",
"outputs":[],
"stateMutability":"nonpayable",
"type":"function"
},

{
"inputs":[],
"name":"increment",
"outputs":[],
"stateMutability":"nonpayable",
"type":"function"
},

{
"inputs":[],
"name":"getBalance",
"outputs":[{"internalType":"uint256","name":"","type":"uint256"}],
"stateMutability":"view",
"type":"function"
}

]

let provider
let signer
let contract

const connectButton = document.getElementById("connectWallet")
const walletText = document.getElementById("walletAddress")
const signatureText = document.getElementById("signatureStatus")

const numberText = document.getElementById("number")
const setButton = document.getElementById("setNumberButton")
const incButton = document.getElementById("incrementButton")

const depositButton = document.getElementById("depositButton")
const depositInput = document.getElementById("depositAmount")

const balanceText = document.getElementById("contractBalance")

const statusText = document.getElementById("status")

async function updateNumber(){

const value = await contract.number()

numberText.innerText = value.toString()

}

async function updateBalance(){

const balance = await contract.getBalance()

balanceText.innerText = ethers.utils.formatEther(balance) + " ETH"

}

connectButton.onclick = async () => {

if(!window.ethereum){

alert("MetaMask não encontrada")

return

}

provider = new ethers.providers.Web3Provider(window.ethereum)

await provider.send("eth_requestAccounts", [])

signer = provider.getSigner()

const address = await signer.getAddress()

walletText.innerText = "Conectado: " + address

// PEDIR ASSINATURA

try{

const message = "Assinar para acessar ARC Protocol"

const signature = await signer.signMessage(message)

console.log("Assinatura:", signature)

signatureText.innerText = "Assinatura confirmada"

}catch(err){

signatureText.innerText = "Assinatura recusada"

return

}

// iniciar contrato

contract = new ethers.Contract(CONTRACT_ADDRESS,ABI,signer)

setButton.disabled = false

incButton.disabled = false

depositButton.disabled = false

await updateNumber()

await updateBalance()

}

setButton.onclick = async () => {

const newValue = document.getElementById("newNumber").value

statusText.innerText = "Executando transação..."

const tx = await contract.setNumber(newValue)

await tx.wait()

await updateNumber()

statusText.innerText = "Número atualizado"

}

incButton.onclick = async () => {

statusText.innerText = "Incrementando..."

const tx = await contract.increment()

await tx.wait()

await updateNumber()

statusText.innerText = "Incrementado"

}

depositButton.onclick = async () => {

const amount = depositInput.value

statusText.innerText = "Depositando..."

const tx = await signer.sendTransaction({

to: CONTRACT_ADDRESS,

value: ethers.utils.parseEther(amount)

})

await tx.wait()

await updateBalance()

statusText.innerText = "Depósito realizado"

}

</script>

</body>

</html>
