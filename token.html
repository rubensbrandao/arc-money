<!-- ARR PROTOCOL FINAL - PRONTO -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ARR Protocol</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>
body{font-family:Arial;background:#f3f4f6;margin:0;padding:20px;}
button{padding:12px;border-radius:10px;border:none;background:#374151;color:#fff;font-weight:bold;cursor:pointer;}
button:hover{background:#1f2937;}
input,select{width:100%;padding:10px;border-radius:10px;margin-bottom:10px;}
.box{background:#fff;padding:20px;border-radius:15px;max-width:400px;margin:auto;}
.status{margin-top:10px;}
</style>
</head>

<body>

<div class="box">
<h2>ARR Protocol</h2>

<button id="connectBtn">Connect Wallet</button>

<p id="wallet">Not connected</p>

<input id="amount" type="number" placeholder="Amount"/>

<button id="swapBtn">Swap</button>

<p class="status" id="status"></p>
</div>

<script>
const ARR_PROTOCOL_ADDRESS = "0x505d906136cab0EEb11Fa8DCf0FedFC337d64f00";

const ABI = [
"function rewardUser(address user, uint256 volumeUSD) external"
];

let provider, signer, user, contract;

const connectBtn = document.getElementById("connectBtn");
const swapBtn = document.getElementById("swapBtn");
const wallet = document.getElementById("wallet");
const status = document.getElementById("status");
const amountInput = document.getElementById("amount");

connectBtn.onclick = async () => {
  try{
    provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();
    user = await signer.getAddress();

    contract = new ethers.Contract(ARR_PROTOCOL_ADDRESS, ABI, signer);

    wallet.innerText = user;

    status.innerText = "Connected";
  }catch(err){
    status.innerText = "Error connecting";
  }
};

swapBtn.onclick = async () => {
  try{
    const amount = amountInput.value;

    if(!amount || amount <= 0){
      status.innerText = "Invalid amount";
      return;
    }

    status.innerText = "Sending transaction...";

    const volume = ethers.utils.parseUnits(amount.toString(), 18);

    const tx = await contract.rewardUser(user, volume);

    status.innerText = "Waiting confirmation...";
    await tx.wait();

    status.innerText = "SUCCESS 🚀";

  }catch(err){
    console.error(err);

    let message = "Swap failed";

    if(err?.data?.message) message = err.data.message;
    else if(err?.message) message = err.message;

    status.innerText = message;
  }
};
</script>

</body>
</html>
